name = "spidersan-keys"
main = "src/index.ts"
compatibility_date = "2026-04-21"
workers_dev = false

[[routes]]
pattern = "spidersan.net/keys*"
zone_name = "spidersan.net"

# Shared KV with api-proxy — same namespace so keys issued here are validated there
[[kv_namespaces]]
binding = "VALID_API_KEYS"
id = "d05e42b679db41249eb9934a21cc2c78"
preview_id = "d05e42b679db41249eb9934a21cc2c78"

[vars]
TURNSTILE_SITE_KEY = "0x4AAAAAADjcO1zH8xDkZP_x"

# Secrets (set via: wrangler secret put <NAME>)
#   TURNSTILE_SECRET_KEY  — CF Turnstile secret (required; issuance fails closed without it)
#   ADMIN_SECRET          — bearer token for POST /keys/revoke (required; revocation fails closed without it)
