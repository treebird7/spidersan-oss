name = "spidersan-keys"
main = "src/index.ts"
compatibility_date = "2026-04-21"
workers_dev = false

[[routes]]
pattern = "spidersan.net/keys*"
zone_name = "spidersan.net"

[[routes]]
pattern = "spidersan.treebird.uk/keys*"
zone_name = "treebird.uk"

# Shared KV with api-proxy — same namespace so keys issued here are validated there
[[kv_namespaces]]
binding = "VALID_API_KEYS"
id = "d05e42b679db41249eb9934a21cc2c78"
preview_id = "d05e42b679db41249eb9934a21cc2c78"

# Vars (public — safe in source; uncomment once Turnstile widget is created)
# [vars]
# TURNSTILE_SITE_KEY = "0x..."

# Secrets (set via: wrangler secret put TURNSTILE_SECRET_KEY)
