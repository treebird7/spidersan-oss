name = "spidersan-api-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[routes]]
pattern = "api-spidersan.treebird.uk/*"
zone_name = "treebird.uk"
# Note: api.spidersan.treebird.uk (two-label subdomain) not covered by *.treebird.uk wildcard cert.
# api-spidersan.treebird.uk (one label) is covered. Switch to api.spidersan.dev once that zone is on CF.

# KV namespace — VALID_API_KEYS
# Created 2026-04-21: wrangler kv namespace create VALID_API_KEYS
[[kv_namespaces]]
binding = "VALID_API_KEYS"
id = "d05e42b679db41249eb9934a21cc2c78"
preview_id = "d05e42b679db41249eb9934a21cc2c78"

# Secrets (managed via: wrangler secret put <NAME>)
#   MODEL_BACKEND_URL = https://spidersan-model.treebird.uk   (Cloudflare Tunnel → mlx_lm.server)
#   MODEL_ID          = /path/to/fused-best-600               (rewritten into proxied requests)
#
# Local dev: wrangler dev --var MODEL_BACKEND_URL:http://localhost:8095
