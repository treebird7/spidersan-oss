name = "spidersan-api-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"
workers_dev = false

[[routes]]
pattern = "api.spidersan.net/v1/*"
zone_name = "spidersan.net"

# KV — credentials (api keys + metadata). Shared with keys worker.
# Created 2026-04-21: wrangler kv namespace create VALID_API_KEYS
[[kv_namespaces]]
binding = "VALID_API_KEYS"
id = "d05e42b679db41249eb9934a21cc2c78"
preview_id = "d05e42b679db41249eb9934a21cc2c78"

# KV — rate-limit counters only (rl:* prefix). Separate from credentials so
# counter TTL policy and enumeration can't touch key records.
# Created 2026-06-13: wrangler kv namespace create SPIDERSAN_COUNTERS_KV
[[kv_namespaces]]
binding = "COUNTERS_KV"
id = "72d00766b0c846a88e2e9048e2756bbf"
preview_id = "72d00766b0c846a88e2e9048e2756bbf"

# Secrets (set via: wrangler secret put <NAME>)
#   MODEL_BACKEND_URL      = https://spidersan-model.treebird.uk
#   MODEL_ID               = sweep-m5-b4v2c4c3m2c5-a095/fused
#   CF_ACCESS_CLIENT_ID    = <service token ID from CF Access dashboard>
#   CF_ACCESS_CLIENT_SECRET = <service token secret from CF Access dashboard>
#
# Local dev: wrangler dev --var MODEL_BACKEND_URL:http://localhost:8095
