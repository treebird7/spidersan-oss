name = "spidersan-api-proxy"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# Routes
[[routes]]
pattern = "api.spidersan.dev/*"
zone_name = "spidersan.dev"

# KV namespace binding — VALID_API_KEYS
# Create with: wrangler kv:namespace create VALID_API_KEYS
# Production: fill in real IDs
[[kv_namespaces]]
binding = "VALID_API_KEYS"
id = "REPLACE_WITH_PRODUCTION_KV_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"

# Environment variables
[vars]
# Override in production secrets: wrangler secret put MODEL_BACKEND_URL
MODEL_BACKEND_URL = "http://localhost:8080"

[env.production]
[[env.production.kv_namespaces]]
binding = "VALID_API_KEYS"
id = "REPLACE_WITH_PRODUCTION_KV_ID"

[env.staging]
[[env.staging.kv_namespaces]]
binding = "VALID_API_KEYS"
id = "REPLACE_WITH_PREVIEW_KV_ID"
