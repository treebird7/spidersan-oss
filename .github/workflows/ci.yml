name: CI

on:
  push:
    branches: [main, docs]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@spidersan.dev"
          git config --global user.name "CI"

      - name: Run tests
        run: npm test -- --run

      - name: Security audit
        run: npm audit --audit-level=high

  test-mcp:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build main package
        run: npm run build

      - name: Build MCP server
        run: cd mcp-server && npm run build

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@spidersan.dev"
          git config --global user.name "CI"

      - name: Run MCP server tests
        run: cd mcp-server && npm run test:run

  test-cli:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test CLI help
        run: node dist/bin/spidersan.js --help

      - name: Test CLI version
        run: node dist/bin/spidersan.js --version

      - name: Test local init
        run: |
          node dist/bin/spidersan.js init
          ls -la .spidersan/
