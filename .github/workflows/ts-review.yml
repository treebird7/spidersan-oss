name: ts-review

on:
  push:
    branches-ignore:
      - main
    paths:
      - '**/*.ts'
      - '!**/*.d.ts'
      - '!**/node_modules/**'

jobs:
  ts-review:
    name: ts-review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Run ts-review
        uses: ./.github/actions/ts-review
        with:
          post-pr-comment: true
          repo-name: treebird7/spidersan-oss
          treebird-token: ${{ secrets.TREEBIRD_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
